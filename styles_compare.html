<!DOCTYPE html>
<html>
<head>
    <title>ShopBase — Pick Your UI Style</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; color: white; font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        h1 { font-size: 32px; margin-bottom: 30px; color: #a78bfa; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 1200px; margin: auto; }
        .card { background: #1a1a2e; border-radius: 16px; padding: 16px; border: 2px solid #333; }
        .card h2 { font-size: 20px; margin-bottom: 12px; color: #e2e8f0; }
        .card img { width: 100%; border-radius: 12px; }
        .card p { color: #94a3b8; margin-top: 8px; font-size: 14px; }
    </style>
</head>
<body>
    <h1>🎨 Pick Your Style — A, B, C or D?</h1>
    <div class="grid">
        <div class="card">
            <h2>A: CRED — Premium Dark 🖤</h2>
            <img src="style_a.png" alt="CRED Dark Style">
            <p>Bold, luxury, gold accents</p>
        </div>
        <div class="card">
            <h2>B: PhonePe — Purple 💜</h2>
            <img src="style_b.png" alt="PhonePe Purple Style">
            <p>Professional, clean, purple gradient</p>
        </div>
        <div class="card">
            <h2>C: Paytm — Light Blue ☁️</h2>
            <img src="style_c.png" alt="Paytm Blue Style">
            <p>Simple, clean, blue header</p>
        </div>
        <div class="card">
            <h2>D: Google Pay — Colorful 🌈</h2>
            <img src="style_d.png" alt="Google Pay Style">
            <p>Minimal, colorful stat cards</p>
        </div>
    </div>
</body>
</html>
